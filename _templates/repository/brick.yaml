# _templates/component/brick.yaml

# Version and environment
version: 0.1.0+1

# Define the Mason version the brick supports
environment:
  mason: ^0.1.1

# Metadata about the brick
name: repository
description: A component entity repository.

# Variables used in the template
vars:
  module_name:
    type: string
    description: The name of the module.
    prompt: What is the name of the module?
    default: module

  repository_name:
    type: string
    description: The name of the repo.
    prompt: What is the name of the repository?
    default: repository

