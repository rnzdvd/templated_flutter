# _templates/component/brick.yaml

# Version and environment
version: 0.1.0+1

# Define the Mason version the brick supports
environment:
  mason: ^0.1.1

# Metadata about the brick
name: component
description: A component template.

# Variables used in the template
vars:
  module_name:
    type: string
    description: The name of the module.
    prompt: What is the name of the module?
    default: module

  component_name:
    type: string
    description: The name of the component.
    prompt: What is the name of the component?
    default: component

